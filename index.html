<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/AP-Pest-Control/ap-pest-logo.png" />
    <title>AP Pest Control</title>
    <!-- SPA redirect: restore path stored by 404.html -->
    <script type="text/javascript">
      (function () {
        var redirect = sessionStorage.getItem("spa-redirect");
        if (redirect) {
          sessionStorage.removeItem("spa-redirect");
          var url = new URL(redirect);
          // Replace the current history entry so the back button works correctly.
          window.history.replaceState(null, "", url.pathname + url.search + url.hash);
        }
      })();
    </script>
