name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
# Needs write access to push the built files to the gh-pages branch
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # github.event.repository.name = "AP-Pest-Control" so base = "/AP-Pest-Control/"
          VITE_BASE_URL: /${{ github.event.repository.name }}
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
